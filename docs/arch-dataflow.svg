<svg width="960" height="820" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic','Apple SD Gothic Neo',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,9 3,0 6" fill="#444"/>
    </marker>
    <marker id="arr-g" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,9 3,0 6" fill="#1E8449"/>
    </marker>
    <marker id="arr-b" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,9 3,0 6" fill="#1A5276"/>
    </marker>
    <marker id="arr-p" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,9 3,0 6" fill="#6C3483"/>
    </marker>
    <marker id="arr-o" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,9 3,0 6" fill="#A04000"/>
    </marker>
    <filter id="sh" x="-6%" y="-6%" width="118%" height="118%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000015"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="820" fill="#F0F2F5" rx="14"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A252F">iKnow  데이터 흐름  (Option B)</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- ACTOR HEADERS -->
  <!-- ═══════════════════════════════════════════════════════ -->

  <!-- Actor: 학생 브라우저 (cx=150) -->
  <rect x="52" y="55" width="196" height="52" rx="9" fill="#2E86C1" filter="url(#sh)"/>
  <text x="150" y="77" text-anchor="middle" font-size="12" font-weight="bold" fill="white">학생 브라우저</text>
  <text x="150" y="96" text-anchor="middle" font-size="10" fill="#AED6F1">React  ·  학생 앱</text>

  <!-- Actor: FastAPI (cx=360) -->
  <rect x="262" y="55" width="196" height="52" rx="9" fill="#1E8449" filter="url(#sh)"/>
  <text x="360" y="77" text-anchor="middle" font-size="12" font-weight="bold" fill="white">FastAPI 서버</text>
  <text x="360" y="96" text-anchor="middle" font-size="10" fill="#A9DFBF">FER · MediaPipe · GPT</text>

  <!-- Actor: Spring Boot (cx=595) -->
  <rect x="497" y="55" width="196" height="52" rx="9" fill="#1A5276" filter="url(#sh)"/>
  <text x="595" y="77" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Spring Boot</text>
  <text x="595" y="96" text-anchor="middle" font-size="10" fill="#AED6F1">:8080</text>

  <!-- Actor: 강사 대시보드 (cx=810) -->
  <rect x="712" y="55" width="196" height="52" rx="9" fill="#6C3483" filter="url(#sh)"/>
  <text x="810" y="77" text-anchor="middle" font-size="12" font-weight="bold" fill="white">강사 대시보드</text>
  <text x="810" y="96" text-anchor="middle" font-size="10" fill="#D7BDE2">WebSocket 구독</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LIFELINES (vertical dashed) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="150" y1="107" x2="150" y2="800" stroke="#2E86C1" stroke-width="1.3" stroke-dasharray="6,5" opacity="0.5"/>
  <line x1="360" y1="107" x2="360" y2="800" stroke="#1E8449" stroke-width="1.3" stroke-dasharray="6,5" opacity="0.5"/>
  <line x1="595" y1="107" x2="595" y2="800" stroke="#1A5276" stroke-width="1.3" stroke-dasharray="6,5" opacity="0.5"/>
  <line x1="810" y1="107" x2="810" y2="800" stroke="#6C3483" stroke-width="1.3" stroke-dasharray="6,5" opacity="0.5"/>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STEP 1 — 카메라 스트림 → FastAPI /detect -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="30" y="132" width="120" height="38" rx="7" fill="#D6EAF8" stroke="#85C1E9" stroke-width="1.5" filter="url(#sh)"/>
  <text x="90" y="150" text-anchor="middle" font-size="10" fill="#1A5276">① 카메라 스트림</text>
  <text x="90" y="163" text-anchor="middle" font-size="9.5" fill="#555">영상 프레임 전송</text>

  <line x1="150" y1="151" x2="354" y2="151" stroke="#1E8449" stroke-width="1.8" marker-end="url(#arr-g)"/>
  <rect x="194" y="138" width="120" height="20" rx="4" fill="#D5F5E3" stroke="#82E0AA" stroke-width="1"/>
  <text x="254" y="152" text-anchor="middle" font-size="9.5" fill="#1E8449">POST /detect</text>

  <!-- STEP 2 — FER + MediaPipe 분석 (FastAPI internal) -->
  <rect x="276" y="186" width="168" height="42" rx="7" fill="#D5F5E3" stroke="#1E8449" stroke-width="1.5" filter="url(#sh)"/>
  <text x="360" y="204" text-anchor="middle" font-size="10" fill="#145A32">FER + MediaPipe 분석</text>
  <text x="360" y="220" text-anchor="middle" font-size="9.5" fill="#555">혼란 점수 계산</text>

  <!-- FastAPI → Student (감지 결과 반환) -->
  <line x1="360" y1="228" x2="360" y2="254" stroke="#1E8449" stroke-width="1.4"/>
  <line x1="360" y1="254" x2="156" y2="254" stroke="#1E8449" stroke-width="1.4" stroke-dasharray="5,3" marker-end="url(#arr-g)"/>
  <rect x="196" y="241" width="110" height="20" rx="4" fill="#D5F5E3" stroke="#82E0AA" stroke-width="1"/>
  <text x="251" y="255" text-anchor="middle" font-size="9.5" fill="#1E8449">감지 결과 반환</text>

  <!-- STEP 3 — 프론트 필터링 -->
  <rect x="52" y="278" width="196" height="48" rx="7" fill="#FCF3CF" stroke="#F4D03F" stroke-width="1.5" filter="url(#sh)"/>
  <text x="150" y="298" text-anchor="middle" font-size="10" font-weight="bold" fill="#7D6608">프론트 필터링</text>
  <text x="150" y="314" text-anchor="middle" font-size="9.5" fill="#777">연속 3회 이상 감지 시에만 전송</text>

  <!-- STEP 4 — POST /api/confused-events -->
  <line x1="248" y1="302" x2="589" y2="302" stroke="#1A5276" stroke-width="1.8" marker-end="url(#arr-b)"/>
  <rect x="284" y="285" width="230" height="24" rx="4" fill="#D6EAF8" stroke="#85C1E9" stroke-width="1"/>
  <text x="399" y="301" text-anchor="middle" font-size="10" fill="#1A5276">POST  /api/confused-events</text>

  <!-- STEP 5 — LearningSignalEvent 저장 + WS Push (Spring internal) -->
  <rect x="504" y="330" width="182" height="54" rx="7" fill="#D6EAF8" stroke="#1A5276" stroke-width="1.5" filter="url(#sh)"/>
  <text x="595" y="350" text-anchor="middle" font-size="10" fill="#1A5276">LearningSignalEvent</text>
  <text x="595" y="366" text-anchor="middle" font-size="9.5" fill="#555">저장 완료</text>
  <text x="595" y="380" text-anchor="middle" font-size="9" fill="#888">signalType 정규화 포함</text>

  <!-- WS Push → Instructor -->
  <line x1="595" y1="384" x2="595" y2="408" stroke="#6C3483" stroke-width="1.4"/>
  <line x1="595" y1="408" x2="804" y2="408" stroke="#6C3483" stroke-width="2" marker-end="url(#arr-p)"/>
  <rect x="644" y="393" width="138" height="22" rx="4" fill="#E8DAEF" stroke="#C39BD3" stroke-width="1"/>
  <text x="713" y="408" text-anchor="middle" font-size="10" fill="#6C3483">⑤ WebSocket Push</text>

  <!-- Instructor receives alert -->
  <rect x="716" y="430" width="188" height="44" rx="7" fill="#E8DAEF" stroke="#6C3483" stroke-width="1.5" filter="url(#sh)"/>
  <text x="810" y="451" text-anchor="middle" font-size="10" font-weight="bold" fill="#6C3483">실시간 알림 수신</text>
  <text x="810" y="466" text-anchor="middle" font-size="9.5" fill="#777">/topic/alert/{sessionId}</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STEP 6 — 2분 녹음 -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect x="52" y="498" width="196" height="44" rx="7" fill="#FDEBD0" stroke="#F0B27A" stroke-width="1.5" filter="url(#sh)"/>
  <text x="150" y="518" text-anchor="middle" font-size="10" font-weight="bold" fill="#784212">혼란 확정 후 2분 녹음</text>
  <text x="150" y="534" text-anchor="middle" font-size="9.5" fill="#777">마이크 스트리밍</text>

  <!-- STT 변환 -->
  <rect x="52" y="558" width="196" height="38" rx="7" fill="#FDEBD0" stroke="#F0B27A" stroke-width="1.5" filter="url(#sh)"/>
  <text x="150" y="578" text-anchor="middle" font-size="10" fill="#784212">STT 변환 완료</text>
  <text x="150" y="592" text-anchor="middle" font-size="9.5" fill="#777">audioText 생성</text>

  <!-- POST /api/lecture-chunk → Spring -->
  <line x1="248" y1="577" x2="589" y2="577" stroke="#A04000" stroke-width="1.8" marker-end="url(#arr-o)"/>
  <rect x="272" y="560" width="192" height="24" rx="4" fill="#FDEBD0" stroke="#F0B27A" stroke-width="1"/>
  <text x="368" y="576" text-anchor="middle" font-size="10" fill="#A04000">POST  /api/lecture-chunk</text>

  <!-- Spring: Alert 생성 -->
  <rect x="504" y="600" width="182" height="46" rx="7" fill="#FDEBD0" stroke="#A04000" stroke-width="1.5" filter="url(#sh)"/>
  <text x="595" y="620" text-anchor="middle" font-size="10" fill="#A04000">Alert 생성</text>
  <text x="595" y="636" text-anchor="middle" font-size="9.5" fill="#555">lectureText · unclearTopic 저장</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STEP 7 — FastAPI /summarize (프론트 직접 호출) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <line x1="150" y1="596" x2="150" y2="666" stroke="#444" stroke-width="1.4"/>
  <line x1="150" y1="666" x2="354" y2="666" stroke="#1E8449" stroke-width="1.8" marker-end="url(#arr-g)"/>
  <rect x="170" y="650" width="146" height="22" rx="4" fill="#D5F5E3" stroke="#82E0AA" stroke-width="1"/>
  <text x="243" y="665" text-anchor="middle" font-size="10" fill="#1E8449">POST  /summarize</text>

  <!-- FastAPI → Student (GPT 요약 + 키워드 반환) -->
  <rect x="276" y="686" width="168" height="42" rx="7" fill="#D5F5E3" stroke="#1E8449" stroke-width="1.5" filter="url(#sh)"/>
  <text x="360" y="705" text-anchor="middle" font-size="10" fill="#145A32">GPT 요약 + 키워드 추출</text>
  <text x="360" y="720" text-anchor="middle" font-size="9.5" fill="#555">summary · keywords 반환</text>
  <line x1="360" y1="728" x2="360" y2="748" stroke="#1E8449" stroke-width="1.4"/>
  <line x1="360" y1="748" x2="156" y2="748" stroke="#1E8449" stroke-width="1.4" stroke-dasharray="5,3" marker-end="url(#arr-g)"/>
  <rect x="188" y="735" width="130" height="20" rx="4" fill="#D5F5E3" stroke="#82E0AA" stroke-width="1"/>
  <text x="253" y="749" text-anchor="middle" font-size="9.5" fill="#1E8449">요약 결과 반환</text>

  <!-- POST /api/lecture-summary → Spring -->
  <line x1="248" y1="760" x2="589" y2="760" stroke="#A04000" stroke-width="1.8" marker-end="url(#arr-o)"/>
  <rect x="270" y="743" width="202" height="24" rx="4" fill="#FDEBD0" stroke="#F0B27A" stroke-width="1"/>
  <text x="371" y="759" text-anchor="middle" font-size="10" fill="#A04000">POST  /api/lecture-summary</text>

  <!-- Spring: Alert 업데이트 -->
  <rect x="504" y="774" width="182" height="52" rx="7" fill="#FDEBD0" stroke="#A04000" stroke-width="1.5" filter="url(#sh)"/>
  <text x="595" y="794" text-anchor="middle" font-size="10" fill="#A04000">Alert 업데이트</text>
  <text x="595" y="809" text-anchor="middle" font-size="9.5" fill="#555">lectureSummary + AlertKeyword</text>
  <text x="595" y="822" text-anchor="middle" font-size="9" fill="#888">최대 3개 · 3단어 이내</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- LEFT SIDE: step number badges -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Step connectors on student lifeline -->
  <line x1="150" y1="170" x2="150" y2="278" stroke="#2E86C1" stroke-width="1.3" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="150" y1="326" x2="150" y2="498" stroke="#2E86C1" stroke-width="1.3" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="150" y1="542" x2="150" y2="558" stroke="#2E86C1" stroke-width="1.3" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="150" y1="748" x2="150" y2="760" stroke="#2E86C1" stroke-width="1.3" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Step badges (numbered circles) -->
  <circle cx="22" cy="151" r="11" fill="#1E8449"/>
  <text x="22" y="155" text-anchor="middle" font-size="9" font-weight="bold" fill="white">1</text>

  <circle cx="22" cy="302" r="11" fill="#1A5276"/>
  <text x="22" y="306" text-anchor="middle" font-size="9" font-weight="bold" fill="white">2</text>

  <circle cx="22" cy="519" r="11" fill="#A04000"/>
  <text x="22" y="523" text-anchor="middle" font-size="9" font-weight="bold" fill="white">3</text>

  <circle cx="22" cy="666" r="11" fill="#1E8449"/>
  <text x="22" y="670" text-anchor="middle" font-size="9" font-weight="bold" fill="white">4</text>

  <circle cx="22" cy="760" r="11" fill="#A04000"/>
  <text x="22" y="764" text-anchor="middle" font-size="9" font-weight="bold" fill="white">5</text>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- STEP LABELS (left margin) -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Already labeled inside boxes -->

  <!-- bottom note -->
  <rect x="30" y="796" width="440" height="18" rx="4" fill="#EBF5FB" stroke="#AED6F1" stroke-width="1"/>
  <text x="250" y="809" text-anchor="middle" font-size="9" fill="#2E86C1">※ FastAPI 와 Spring Boot 는 직접 통신하지 않습니다. 프론트엔드가 중개합니다.</text>
</svg>
