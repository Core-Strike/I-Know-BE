<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic','Apple SD Gothic Neo',Arial,sans-serif">
  <defs>
    <marker id="marr" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,9 3,0 6" fill="#555"/>
    </marker>
    <marker id="marr-g" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,9 3,0 6" fill="#1E8449"/>
    </marker>
    <marker id="marr-b" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,9 3,0 6" fill="#1A5276"/>
    </marker>
    <marker id="marr-p" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,9 3,0 6" fill="#6C3483"/>
    </marker>
    <marker id="marr-o" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,9 3,0 6" fill="#A04000"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="900" height="600" fill="#F0F2F5" rx="14"/>

  <!-- ── Title ── -->
  <text x="450" y="36" text-anchor="middle" font-size="19" font-weight="bold" fill="#1A252F">iKnow  시스템 아키텍처</text>

  <!-- ══════════════ CLIENT LAYER ══════════════ -->
  <rect x="24" y="52" width="852" height="140" rx="12" fill="#D6EAF8" stroke="#85C1E9" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="24" y="52" width="852" height="28" rx="12" fill="#2E86C1" opacity="0.85"/>
  <rect x="24" y="66" width="852" height="14" fill="#2E86C1" opacity="0.85"/>
  <text x="42" y="71" font-size="11" font-weight="bold" fill="white" letter-spacing="1">CLIENT LAYER</text>

  <!-- Student Browser box -->
  <rect x="52" y="86" width="188" height="94" rx="9" fill="white" stroke="#2E86C1" stroke-width="2" filter="url(#shadow)"/>
  <rect x="52" y="86" width="188" height="26" rx="9" fill="#2E86C1" opacity="0.9"/>
  <rect x="52" y="100" width="188" height="12" fill="#2E86C1" opacity="0.9"/>
  <text x="146" y="103" text-anchor="middle" font-size="10.5" font-weight="bold" fill="white">학생 브라우저</text>
  <text x="146" y="127" text-anchor="middle" font-size="10" fill="#555">React  ·  학생 앱</text>
  <text x="146" y="144" text-anchor="middle" font-size="10" fill="#2E86C1">📷 카메라  /  🎤 마이크</text>
  <text x="146" y="162" text-anchor="middle" font-size="9.5" fill="#888">프론트 필터링 포함</text>

  <!-- Instructor Browser box -->
  <rect x="660" y="86" width="188" height="94" rx="9" fill="white" stroke="#7D3C98" stroke-width="2" filter="url(#shadow)"/>
  <rect x="660" y="86" width="188" height="26" rx="9" fill="#7D3C98" opacity="0.9"/>
  <rect x="660" y="100" width="188" height="12" fill="#7D3C98" opacity="0.9"/>
  <text x="754" y="103" text-anchor="middle" font-size="10.5" font-weight="bold" fill="white">강사 브라우저</text>
  <text x="754" y="127" text-anchor="middle" font-size="10" fill="#555">React  ·  강사 대시보드</text>
  <text x="754" y="144" text-anchor="middle" font-size="10" fill="#7D3C98">🔔 WebSocket 구독</text>
  <text x="754" y="162" text-anchor="middle" font-size="9.5" fill="#888">실시간 혼란 알림 수신</text>

  <!-- ══════════════ SERVICE LAYER ══════════════ -->
  <rect x="24" y="238" width="852" height="158" rx="12" fill="#D5F5E3" stroke="#82E0AA" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="24" y="238" width="852" height="28" rx="12" fill="#1E8449" opacity="0.85"/>
  <rect x="24" y="252" width="852" height="14" fill="#1E8449" opacity="0.85"/>
  <text x="42" y="257" font-size="11" font-weight="bold" fill="white" letter-spacing="1">SERVICE LAYER</text>

  <!-- FastAPI box -->
  <rect x="52" y="272" width="228" height="110" rx="9" fill="white" stroke="#1E8449" stroke-width="2" filter="url(#shadow)"/>
  <rect x="52" y="272" width="228" height="26" rx="9" fill="#1E8449" opacity="0.9"/>
  <rect x="52" y="286" width="228" height="12" fill="#1E8449" opacity="0.9"/>
  <text x="166" y="289" text-anchor="middle" font-size="10.5" font-weight="bold" fill="white">FastAPI 서버</text>
  <text x="166" y="316" text-anchor="middle" font-size="10" fill="#555">FER + MediaPipe + GPT</text>
  <text x="166" y="333" text-anchor="middle" font-size="10" fill="#555">POST  /detect</text>
  <text x="166" y="350" text-anchor="middle" font-size="10" fill="#555">POST  /summarize</text>
  <text x="166" y="370" text-anchor="middle" font-size="9" fill="#999">※ Spring과 직접 연결 없음</text>

  <!-- Spring Boot box -->
  <rect x="560" y="272" width="292" height="110" rx="9" fill="white" stroke="#1A5276" stroke-width="2" filter="url(#shadow)"/>
  <rect x="560" y="272" width="292" height="26" rx="9" fill="#1A5276" opacity="0.9"/>
  <rect x="560" y="286" width="292" height="12" fill="#1A5276" opacity="0.9"/>
  <text x="706" y="289" text-anchor="middle" font-size="10.5" font-weight="bold" fill="white">Spring Boot  :8080</text>
  <text x="706" y="316" text-anchor="middle" font-size="10" fill="#555">REST API  (세션 · 이벤트 · 대시보드)</text>
  <text x="706" y="333" text-anchor="middle" font-size="10" fill="#555">WebSocket  STOMP / SockJS</text>
  <text x="706" y="350" text-anchor="middle" font-size="10" fill="#555">Spring Data JPA  +  MySQL 연동</text>
  <text x="706" y="367" text-anchor="middle" font-size="9.5" fill="#777">Java 21  ·  Spring Boot 4.0.5</text>

  <!-- ══════════════ DATA LAYER ══════════════ -->
  <rect x="24" y="448" width="852" height="132" rx="12" fill="#FDEBD0" stroke="#F0B27A" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="24" y="448" width="852" height="28" rx="12" fill="#A04000" opacity="0.85"/>
  <rect x="24" y="462" width="852" height="14" fill="#A04000" opacity="0.85"/>
  <text x="42" y="467" font-size="11" font-weight="bold" fill="white" letter-spacing="1">DATA LAYER</text>

  <!-- MySQL box -->
  <rect x="290" y="480" width="320" height="86" rx="9" fill="white" stroke="#A04000" stroke-width="2" filter="url(#shadow)"/>
  <rect x="290" y="480" width="320" height="26" rx="9" fill="#A04000" opacity="0.9"/>
  <rect x="290" y="494" width="320" height="12" fill="#A04000" opacity="0.9"/>
  <text x="450" y="497" text-anchor="middle" font-size="10.5" font-weight="bold" fill="white">MySQL 8  ·  52.78.190.57:3306/iknow</text>
  <line x1="450" y1="506" x2="450" y2="564" stroke="#EEE" stroke-width="1.2"/>
  <text x="360" y="524" text-anchor="middle" font-size="9.5" fill="#555">sessions</text>
  <text x="360" y="540" text-anchor="middle" font-size="9.5" fill="#555">alerts  /  alert_keywords</text>
  <text x="360" y="556" text-anchor="middle" font-size="9.5" fill="#555">session_participants</text>
  <text x="540" y="524" text-anchor="middle" font-size="9.5" fill="#555">learning_signal_events</text>
  <text x="540" y="540" text-anchor="middle" font-size="9.5" fill="#555">curriculums</text>

  <!-- ══════════════ ARROWS ══════════════ -->

  <!-- ① Student → FastAPI (영상 프레임) -->
  <line x1="128" y1="180" x2="128" y2="272" stroke="#1E8449" stroke-width="2" marker-end="url(#marr-g)"/>
  <rect x="30" y="217" width="90" height="20" rx="4" fill="#D5F5E3" stroke="#82E0AA" stroke-width="1"/>
  <text x="75" y="231" text-anchor="middle" font-size="9.5" fill="#1E8449">① /detect</text>

  <!-- FastAPI → Student (감지 결과, dashed) -->
  <line x1="163" y1="272" x2="163" y2="180" stroke="#1E8449" stroke-width="1.4" stroke-dasharray="5,3" marker-end="url(#marr-g)"/>
  <rect x="170" y="217" width="78" height="20" rx="4" fill="#D5F5E3" stroke="#82E0AA" stroke-width="1"/>
  <text x="209" y="231" text-anchor="middle" font-size="9.5" fill="#1E8449">결과 반환</text>

  <!-- ③ Student → Spring (confused-events, lecture-chunk, lecture-summary) -->
  <path d="M 240,133 C 400,133 460,312 560,312" stroke="#1A5276" stroke-width="2" fill="none" marker-end="url(#marr-b)"/>
  <rect x="280" y="186" width="180" height="38" rx="4" fill="#D6EAF8" stroke="#85C1E9" stroke-width="1"/>
  <text x="370" y="200" text-anchor="middle" font-size="9.5" fill="#1A5276">③ POST /api/confused-events</text>
  <text x="370" y="217" text-anchor="middle" font-size="9" fill="#666">lecture-chunk  /  lecture-summary</text>

  <!-- ⑤ Spring → Instructor (WebSocket Push) -->
  <path d="M 852,312 C 876,240 858,166 754,180" stroke="#6C3483" stroke-width="2" fill="none" marker-end="url(#marr-p)"/>
  <rect x="826" y="218" width="68" height="38" rx="4" fill="#E8DAEF" stroke="#C39BD3" stroke-width="1"/>
  <text x="860" y="232" text-anchor="middle" font-size="9.5" fill="#6C3483">⑤ WS Push</text>
  <text x="860" y="248" text-anchor="middle" font-size="9" fill="#777">/topic/alert</text>

  <!-- ④ Spring → MySQL (DB 저장) -->
  <path d="M 706,382 L 706,420 L 450,420 L 450,480" stroke="#A04000" stroke-width="2" fill="none" marker-end="url(#marr-o)"/>
  <rect x="548" y="410" width="74" height="20" rx="4" fill="#FDEBD0" stroke="#F0B27A" stroke-width="1"/>
  <text x="585" y="424" text-anchor="middle" font-size="9.5" fill="#A04000">④ DB 저장</text>
</svg>
