<svg width="900" height="660" xmlns="http://www.w3.org/2000/svg" font-family="'Malgun Gothic','Apple SD Gothic Neo',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,9 3,0 6" fill="#444"/>
    </marker>
    <marker id="arr-b" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,9 3,0 6" fill="#1A5276"/>
    </marker>
    <marker id="arr-g" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,9 3,0 6" fill="#1E8449"/>
    </marker>
    <marker id="arr-r" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,9 3,0 6" fill="#922B21"/>
    </marker>
    <marker id="arr-y" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,9 3,0 6" fill="#7D6608"/>
    </marker>
    <filter id="sh" x="-6%" y="-6%" width="118%" height="118%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000015"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="660" fill="#F0F2F5" rx="14"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A252F">iKnow  세션 생명주기</text>
  <text x="450" y="56" text-anchor="middle" font-size="11" fill="#7F8C8D">Session Lifecycle</text>

  <!-- ═══ STEP 1: 세션 생성 ═══ -->
  <rect x="280" y="78" width="340" height="72" rx="10" fill="white" stroke="#1A5276" stroke-width="2" filter="url(#sh)"/>
  <rect x="280" y="78" width="340" height="28" rx="10" fill="#1A5276"/>
  <rect x="280" y="92" width="340" height="14" fill="#1A5276"/>
  <text x="450" y="97" text-anchor="middle" font-size="11" font-weight="bold" fill="white">① 세션 생성  —  POST /api/sessions</text>
  <text x="450" y="120" text-anchor="middle" font-size="10" fill="#555">classId  ·  curriculum  ·  thresholdPct(기본 50)</text>
  <text x="450" y="138" text-anchor="middle" font-size="10" fill="#555">커리큘럼 DB 검증 후 8자리 alphanumeric ID 생성</text>

  <!-- ID 생성 box (right) -->
  <rect x="660" y="84" width="212" height="60" rx="8" fill="#EAF4FB" stroke="#85C1E9" stroke-width="1.5" filter="url(#sh)"/>
  <text x="766" y="107" text-anchor="middle" font-size="10" font-weight="bold" fill="#1A5276">세션 ID 생성 규칙</text>
  <text x="766" y="123" text-anchor="middle" font-size="10" fill="#555">A–Z · 0–9  ×  8자리</text>
  <text x="766" y="139" text-anchor="middle" font-size="9.5" fill="#888">충돌 시 자동 재생성</text>
  <line x1="620" y1="114" x2="660" y2="114" stroke="#85C1E9" stroke-width="1.3" stroke-dasharray="4,3"/>

  <!-- Example ID badge -->
  <rect x="26" y="90" width="212" height="52" rx="8" fill="#EAF4FB" stroke="#85C1E9" stroke-width="1.5" filter="url(#sh)"/>
  <text x="132" y="111" text-anchor="middle" font-size="10" font-weight="bold" fill="#1A5276">예시 응답</text>
  <text x="132" y="127" text-anchor="middle" font-size="10" fill="#555">sessionId: "AB12CD34"</text>
  <text x="132" y="141" text-anchor="middle" font-size="9.5" fill="#888">status: ACTIVE</text>
  <line x1="238" y1="114" x2="280" y2="114" stroke="#85C1E9" stroke-width="1.3" stroke-dasharray="4,3"/>

  <!-- Arrow down -->
  <line x1="450" y1="150" x2="450" y2="190" stroke="#444" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- ═══ STEP 2: 학생 입장 ═══ -->
  <rect x="280" y="190" width="340" height="62" rx="10" fill="white" stroke="#1E8449" stroke-width="2" filter="url(#sh)"/>
  <rect x="280" y="190" width="340" height="26" rx="10" fill="#1E8449"/>
  <rect x="280" y="204" width="340" height="12" fill="#1E8449"/>
  <text x="450" y="207" text-anchor="middle" font-size="11" font-weight="bold" fill="white">② 학생 입장  —  POST /api/sessions/{id}/participants/join</text>
  <text x="450" y="230" text-anchor="middle" font-size="10" fill="#555">studentId  ·  studentName</text>
  <text x="450" y="246" text-anchor="middle" font-size="10" fill="#555">SessionParticipant 생성  (active: true)</text>

  <!-- Arrow down -->
  <line x1="450" y1="252" x2="450" y2="292" stroke="#444" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- ═══ STEP 3: 수업 진행 ═══ -->
  <rect x="200" y="292" width="500" height="106" rx="10" fill="white" stroke="#7D6608" stroke-width="2" filter="url(#sh)"/>
  <rect x="200" y="292" width="500" height="26" rx="10" fill="#D4AC0D"/>
  <rect x="200" y="306" width="500" height="12" fill="#D4AC0D"/>
  <text x="450" y="309" text-anchor="middle" font-size="11" font-weight="bold" fill="white">③ 수업 진행 중</text>
  <!-- Three mini boxes inside -->
  <rect x="214" y="326" width="150" height="60" rx="6" fill="#FEF9E7" stroke="#F4D03F" stroke-width="1.2"/>
  <text x="289" y="345" text-anchor="middle" font-size="9.5" fill="#7D6608">혼란 감지</text>
  <text x="289" y="360" text-anchor="middle" font-size="9" fill="#555">POST /api/</text>
  <text x="289" y="373" text-anchor="middle" font-size="9" fill="#555">confused-events</text>
  <text x="289" y="386" text-anchor="middle" font-size="9" fill="#888">LearningSignalEvent</text>

  <rect x="375" y="326" width="150" height="60" rx="6" fill="#FEF9E7" stroke="#F4D03F" stroke-width="1.2"/>
  <text x="450" y="345" text-anchor="middle" font-size="9.5" fill="#7D6608">강의 청크 저장</text>
  <text x="450" y="360" text-anchor="middle" font-size="9" fill="#555">POST /api/</text>
  <text x="450" y="373" text-anchor="middle" font-size="9" fill="#555">lecture-chunk</text>
  <text x="450" y="386" text-anchor="middle" font-size="9" fill="#888">Alert 생성</text>

  <rect x="536" y="326" width="150" height="60" rx="6" fill="#FEF9E7" stroke="#F4D03F" stroke-width="1.2"/>
  <text x="611" y="345" text-anchor="middle" font-size="9.5" fill="#7D6608">요약 저장</text>
  <text x="611" y="360" text-anchor="middle" font-size="9" fill="#555">POST /api/</text>
  <text x="611" y="373" text-anchor="middle" font-size="9" fill="#555">lecture-summary</text>
  <text x="611" y="386" text-anchor="middle" font-size="9" fill="#888">Alert 업데이트</text>

  <!-- Arrow down: fork -->
  <line x1="450" y1="398" x2="450" y2="438" stroke="#444" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="450" y="428" text-anchor="middle" font-size="10" fill="#777">수업 종료</text>

  <!-- ═══ FORK: 종료 방식 선택 ═══ -->
  <!-- Diamond shape -->
  <polygon points="450,450 530,490 450,530 370,490" fill="white" stroke="#555" stroke-width="2" filter="url(#sh)"/>
  <text x="450" y="487" text-anchor="middle" font-size="10" fill="#333">종료</text>
  <text x="450" y="501" text-anchor="middle" font-size="10" fill="#333">방식?</text>

  <!-- STEP 4a: end (soft) - left -->
  <line x1="370" y1="490" x2="210" y2="490" stroke="#1A5276" stroke-width="1.8" marker-end="url(#arr-b)"/>
  <text x="290" y="483" text-anchor="middle" font-size="9.5" fill="#1A5276">PATCH /end</text>

  <rect x="26" y="462" width="184" height="82" rx="10" fill="white" stroke="#1A5276" stroke-width="2" filter="url(#sh)"/>
  <rect x="26" y="462" width="184" height="26" rx="10" fill="#1A5276"/>
  <rect x="26" y="476" width="184" height="12" fill="#1A5276"/>
  <text x="118" y="479" text-anchor="middle" font-size="10" font-weight="bold" fill="white">④-A Soft End</text>
  <text x="118" y="502" text-anchor="middle" font-size="9.5" fill="#555">status → ENDED</text>
  <text x="118" y="518" text-anchor="middle" font-size="9.5" fill="#555">endedAt 기록</text>
  <text x="118" y="534" text-anchor="middle" font-size="9" fill="#888">참가자 전원 퇴장 처리</text>

  <!-- STEP 4b: terminate (hard) - right -->
  <line x1="530" y1="490" x2="690" y2="490" stroke="#922B21" stroke-width="1.8" marker-end="url(#arr-r)"/>
  <text x="610" y="483" text-anchor="middle" font-size="9.5" fill="#922B21">POST /terminate</text>

  <rect x="690" y="462" width="184" height="82" rx="10" fill="white" stroke="#922B21" stroke-width="2" filter="url(#sh)"/>
  <rect x="690" y="462" width="184" height="26" rx="10" fill="#922B21"/>
  <rect x="690" y="476" width="184" height="12" fill="#922B21"/>
  <text x="782" y="479" text-anchor="middle" font-size="10" font-weight="bold" fill="white">④-B Terminate</text>
  <text x="782" y="502" text-anchor="middle" font-size="9.5" fill="#555">status → ENDED</text>
  <text x="782" y="518" text-anchor="middle" font-size="9.5" fill="#555">DB에서 물리 삭제</text>
  <text x="782" y="534" text-anchor="middle" font-size="9" fill="#888">없어도 정상 응답 (204)</text>

  <!-- Both converge to ENDED badge -->
  <line x1="118" y1="544" x2="118" y2="580" stroke="#444" stroke-width="1.3" stroke-dasharray="4,3"/>
  <line x1="118" y1="580" x2="430" y2="580" stroke="#444" stroke-width="1.3" stroke-dasharray="4,3"/>
  <line x1="782" y1="544" x2="782" y2="580" stroke="#444" stroke-width="1.3" stroke-dasharray="4,3"/>
  <line x1="782" y1="580" x2="470" y2="580" stroke="#444" stroke-width="1.3" stroke-dasharray="4,3"/>
  <line x1="450" y1="580" x2="450" y2="606" stroke="#444" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- STEP 5: ENDED state -->
  <rect x="310" y="606" width="280" height="38" rx="9" fill="#922B21" filter="url(#sh)"/>
  <text x="450" y="622" text-anchor="middle" font-size="11" font-weight="bold" fill="white">SESSION  ENDED</text>
  <text x="450" y="637" text-anchor="middle" font-size="10" fill="#FADBD8">status: ENDED  ·  endedAt 기록</text>

  <!-- ═══ AUTO EXPIRE annotation (right side) ═══ -->
  <rect x="670" y="248" width="204" height="80" rx="9" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1.5" filter="url(#sh)"/>
  <text x="772" y="272" text-anchor="middle" font-size="10" font-weight="bold" fill="#922B21">⑤ 자동 만료</text>
  <text x="772" y="290" text-anchor="middle" font-size="9.5" fill="#555">startedAt + 24시간 초과 시</text>
  <text x="772" y="306" text-anchor="middle" font-size="9.5" fill="#555">다음 API 호출 시 lazy 전환</text>
  <text x="772" y="322" text-anchor="middle" font-size="9" fill="#888">별도 스케줄러 없음</text>

  <!-- dotted line: auto expire connects to flow -->
  <line x1="670" y1="288" x2="620" y2="288" stroke="#E74C3C" stroke-width="1.2" stroke-dasharray="5,3"/>
  <line x1="620" y1="288" x2="620" y2="620" stroke="#E74C3C" stroke-width="1.2" stroke-dasharray="5,3"/>
  <line x1="620" y1="620" x2="590" y2="620" stroke="#E74C3C" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-r)"/>

  <!-- GET /api/sessions/{id} annotation -->
  <rect x="26" y="248" width="212" height="58" rx="8" fill="#E8F8F5" stroke="#82E0AA" stroke-width="1.5" filter="url(#sh)"/>
  <text x="132" y="270" text-anchor="middle" font-size="10" font-weight="bold" fill="#1E8449">GET /api/sessions/{id}</text>
  <text x="132" y="287" text-anchor="middle" font-size="9.5" fill="#555">현재 상태 조회</text>
  <text x="132" y="302" text-anchor="middle" font-size="9" fill="#888">만료 체크 포함</text>
  <line x1="238" y1="277" x2="280" y2="302" stroke="#82E0AA" stroke-width="1.2" stroke-dasharray="4,3"/>
</svg>
